# =============================================================================
# Docker Compose - Video Watermark Removal Application (OpenCV Engine)
# =============================================================================
# CPU-optimized configuration for Intel Iris Xe hardware.
# Uses OpenCV Telea inpainting — no deep learning, no GPU required.
# =============================================================================

services:
  watermark-app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: watermark-remover

    # Map host port 8000 to container port 8000
    ports:
      - "8000:8000"

    # -------------------------------------------------------------------------
    # Volume mappings
    # -------------------------------------------------------------------------
    # - ./uploads:/app/uploads  — Persists processed video artifacts on the host
    # - ./static:/app/static    — Mounts static frontend for hot-reloading
    # - Source files mounted for development convenience (no rebuild needed)
    volumes:
      - ./uploads:/app/uploads
      - ./static:/app/static
      - ./main.py:/app/main.py
      - ./inpainter.py:/app/inpainter.py
      - ./video_utils.py:/app/video_utils.py

    # -------------------------------------------------------------------------
    # Environment variables
    # -------------------------------------------------------------------------
    environment:
      - MAX_UPLOAD_SIZE_MB=100
      - UPLOAD_DIR=/app/uploads

    # Restart on failure, but not on manual stop
    restart: unless-stopped
