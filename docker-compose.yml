# =============================================================================
# Docker Compose - Video Watermark Removal Application (ProPainter)
# =============================================================================
# CPU-only configuration for Intel Iris Xe hardware.
# No NVIDIA/GPU pass-through required.
#
# NOTE: ProPainter runs on CPU. Processing time depends on video length and
# resolution. Videos are automatically downscaled to 480p for inference.
# =============================================================================

services:
  watermark-app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: watermark-remover

    # Map host port 8000 to container port 8000
    ports:
      - "8000:8000"

    # -------------------------------------------------------------------------
    # Volume mappings
    # -------------------------------------------------------------------------
    # - ./uploads:/app/uploads  — Persists processed video artifacts on the host
    # - ./static:/app/static    — Mounts static frontend for hot-reloading
    volumes:
      - ./uploads:/app/uploads
      - ./static:/app/static

    # -------------------------------------------------------------------------
    # Environment variables
    # -------------------------------------------------------------------------
    environment:
      - MAX_UPLOAD_SIZE_MB=100
      - UPLOAD_DIR=/app/uploads

    # Restart on failure, but not on manual stop
    restart: unless-stopped

    # -------------------------------------------------------------------------
    # NOTE: GPU / NVIDIA support
    # -------------------------------------------------------------------------
    # This machine has Intel Iris Xe GPU which is incompatible with NVIDIA
    # CUDA. The GPU block below is commented out.
    #
    # If you ever move to an NVIDIA machine, uncomment this block and rebuild:
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    #
    # And swap the base image in Dockerfile to:
    #   FROM nvidia/cuda:11.8.0-cudnn8-runtime-ubuntu22.04
    # -------------------------------------------------------------------------
